<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💰 Poleramma Temple Donations</title>

<link rel="stylesheet" href="CSS/donations.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>

<body>

<header>
    <div class="logo-container">
        <img src="templeimage/1742626228036 (1).jpg" class="header-logo">
        <h1>🌸 శ్రీ చీరాల పోలేరమ్మ తల్లి దేవస్థానం 🌸</h1>
        <img src="templeimage/1742626228036 (1).jpg" class="header-logo">
    </div>

    <nav>
        <ul>
            <li><a href="#">🏠 Home</a></li>
            <li><a href="#">🖼️ Updates</a></li>
            <li><a href="#donation-section">💰 Donations</a></li>
            <li><a href="#inquiry-form">📞 Contact</a></li>
        </ul>
    </nav>
</header>

<!-- Announcement -->
<section class="donation-section">
    <h2>🛕 ఆలయ పునర్నిర్మాణం 🛕</h2>
    <p>₹10,116/- విరాళం ఇచ్చిన దాతల పేర్లు శిలాఫలకంలో చెక్కబడతాయి.</p>
</section>

<!-- Donation -->
<section class="donation-section" id="donation-section">
    <h2>🌺 Donate Now 🌺</h2>

    <p><strong>UPI:</strong> polerammatemple@upi</p>

    <a href="upi://pay?pa=polerammatemple@upi&pn=Poleramma Temple">
        <button>💳 Pay via UPI</button>
    </a>

    <button id="donateButton">Show QR</button>

    <div id="qrSection" style="display:none;">
        <img src="templeimage/1745470602223 (1).jpg" width="200">
    </div>
</section>

<!-- Inquiry -->
<section class="donation-section" id="inquiry-form">

    <h2>📞 Contact Us</h2>

    <form id="donationForm">
        <input type="text" id="name" placeholder="Name" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="tel" id="phone" placeholder="Phone" required>
        <textarea id="message" placeholder="Message" required></textarea>

        <button type="submit">Submit</button>
    </form>

</section>

<footer>
    <p>🙏 Poleramma Temple</p>
</footer>

<script src="js/donations.js"></script>

</body>
</html>
